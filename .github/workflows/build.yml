name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BubbleVillagers
        path: target/BubbleVillagers-*.jar
        
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package
      
    - name: Get version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: target/BubbleVillagers-*.jar
        draft: false
        prerelease: ${{ contains(github.ref, 'BETA') || contains(github.ref, 'ALPHA') || contains(github.ref, 'RC') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Publish to Modrinth
      if: env.MODRINTH_TOKEN != ''
      uses: Kir-Antipov/mc-publish@v3.3
      with:
        modrinth-id: YOUR_MODRINTH_PROJECT_ID
        modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
        files: target/BubbleVillagers-*.jar
        name: BubbleVillagers ${{ steps.version.outputs.VERSION }}
        version: ${{ steps.version.outputs.VERSION }}
        version-type: ${{ contains(github.ref, 'BETA') && 'beta' || contains(github.ref, 'ALPHA') && 'alpha' || 'release' }}
        loaders: |
          paper
          folia
        game-versions: |
          26.1
          26.1.1
          26.1.2
        dependencies: |
          paper(required){modrinth:P7dR8mSH}
        changelog-file: CHANGELOG.md
      env:
        MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
